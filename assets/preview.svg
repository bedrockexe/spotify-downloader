  <circle cx="92" cy="402" r="4" fill="#1ed760"/>
  <rect x="118" y="380" width="44" height="44" rx="9" fill="url(#c3)"/>
  <text x="176" y="398" fill="#ffffff" font-size="16" font-weight="700">Paper Planes</text>
  <text x="176" y="417" fill="#9a9a9a" font-size="13">Cassette Kids</text>
  <text x="764" y="407" fill="#9a9a9a" font-size="14" text-anchor="end">3:18</text>
  <rect x="792" y="389" width="124" height="26" rx="13" fill="#1ed760" fill-opacity="0.12"/>
