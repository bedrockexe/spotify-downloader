  <text x="212" y="171" fill="#ffffff" font-size="32" font-weight="800" letter-spacing="-0.5">Chill Mix</text>
  <text x="214" y="197" fill="#b3b3b3" font-size="14">Downloading tracks&#8230;</text>
  <rect x="214" y="207" width="340" height="8" rx="4" fill="#0c0c0c" stroke="#ffffff" stroke-opacity="0.08"/>
  <rect x="214" y="207" width="200" height="8" rx="4" fill="#1ed760"/>
  <text x="566" y="215" fill="#1ed760" font-size="13" font-weight="700">7 / 12</text>

  <line x1="72" y1="252" x2="928" y2="252" stroke="#ffffff" stroke-opacity="0.07"/>

