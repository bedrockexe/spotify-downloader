  <rect x="118" y="488" width="44" height="44" rx="9" fill="url(#c5)"/>
  <text x="176" y="506" fill="#d0d0d0" font-size="16" font-weight="700">Slow Motion</text>
  <text x="176" y="525" fill="#9a9a9a" font-size="13">Hale &amp; Co.</text>
  <text x="764" y="515" fill="#9a9a9a" font-size="14" text-anchor="end">4:21</text>
  <rect x="792" y="497" width="124" height="26" rx="13" fill="#ffffff" fill-opacity="0.05"/>
  <text x="854" y="514" fill="#8a8a8a" font-size="12.5" font-weight="700" text-anchor="middle">Queued</text>
