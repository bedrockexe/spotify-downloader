  <circle cx="72" cy="64" r="6" fill="#ff5f56"/><circle cx="92" cy="64" r="6" fill="#ffbd2e"/><circle cx="112" cy="64" r="6" fill="#27c93f"/>
  <rect x="150" y="52" width="280" height="24" rx="12" fill="#0c0c0c" stroke="#ffffff" stroke-opacity="0.06"/>
  <text x="166" y="68" fill="#8a8a8a" font-size="13">127.0.0.1:5000</text>
  <line x1="40" y1="88" x2="960" y2="88" stroke="#ffffff" stroke-opacity="0.06"/>

  <!-- Collection header: cover mosaic -->
  <g clip-path="url(#mosaic)">
    <rect x="72" y="108" width="57" height="57" fill="url(#c1)"/>
    <rect x="135" y="108" width="57" height="57" fill="url(#c3)"/>
    <rect x="72" y="171" width="57" height="57" fill="url(#c4)"/>
    <rect x="135" y="171" width="57" height="57" fill="url(#c5)"/>
  </g>

