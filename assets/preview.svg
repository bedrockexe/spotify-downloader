<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="pbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c130f"/><stop offset="1" stop-color="#060606"/>
    </linearGradient>
    <radialGradient id="pglow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#1ed760" stop-opacity="0.22"/><stop offset="1" stop-color="#1ed760" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="c1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ff8787"/><stop offset="1" stop-color="#e03131"/></linearGradient>
    <linearGradient id="c2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#63e6be"/><stop offset="1" stop-color="#0ca678"/></linearGradient>
    <linearGradient id="c3" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#74c0fc"/><stop offset="1" stop-color="#1971c2"/></linearGradient>
    <linearGradient id="c4" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ffd43b"/><stop offset="1" stop-color="#e8590c"/></linearGradient>
    <linearGradient id="c5" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#b197fc"/><stop offset="1" stop-color="#6741d9"/></linearGradient>
    <clipPath id="mosaic"><rect x="72" y="108" width="120" height="120" rx="16"/></clipPath>
  </defs>

  <rect width="1000" height="600" fill="url(#pbg)"/>
  <ellipse cx="300" cy="40" rx="500" ry="300" fill="url(#pglow)"/>

  <!-- App window -->
  <rect x="40" y="40" width="920" height="520" rx="24" fill="#121212" stroke="#ffffff" stroke-opacity="0.08"/>

